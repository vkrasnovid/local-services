# Dev overrides: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  celery-worker:
    volumes:
      - ./backend:/app

  celery-beat:
    volumes:
      - ./backend:/app

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped
